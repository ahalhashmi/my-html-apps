<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#174a63">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Science Lab">
  <title>Grade 4 Science Lab</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <a class="hub-link" href="../" aria-label="Back to app hub">Hub</a>
    <div class="brand">
      <div class="brand-mark" aria-hidden="true">G4</div>
      <div>
        <p>Final Revision</p>
        <h1>Science Lab</h1>
      </div>
    </div>
    <div class="top-actions">
      <button class="ghost-button" id="reset-progress" type="button">Reset</button>
      <a class="ghost-button" href="results.html">Last Result</a>
    </div>
  </header>

  <main class="app-shell">
    <nav class="station-rail" id="station-rail" aria-label="Science stations"></nav>

    <section class="lesson-board" aria-live="polite">
      <div class="board-head">
        <div>
          <p class="station-kicker" id="station-kicker">Station</p>
          <h2 id="station-title">Loading...</h2>
        </div>
        <div class="score-pill" id="progress-pill">0 of 7 done</div>
      </div>

      <div class="lesson-grid">
        <section class="study-pane">
          <div class="visual-wrap" id="visual-wrap"></div>
          <div class="quick-notes" id="quick-notes"></div>
        </section>

        <section class="practice-pane">
          <div class="practice-head">
            <p>Practice</p>
            <h3 id="practice-title">Try it</h3>
          </div>
          <div id="practice-area"></div>
          <div class="feedback" id="feedback" role="status"></div>
        </section>
      </div>

      <div class="board-actions">
        <button class="secondary-button" id="prev-station" type="button">Previous</button>
        <button class="secondary-button" id="next-station" type="button">Next station</button>
        <button class="primary-button" id="quiz-open" type="button">Final quiz</button>
      </div>
    </section>

    <section class="quiz-board" id="quiz-board" hidden>
      <div class="quiz-head">
        <div>
          <p class="station-kicker">Final Check</p>
          <h2>Quiz Time</h2>
        </div>
        <button class="ghost-button" id="close-quiz" type="button">Back to practice</button>
      </div>
      <div class="quiz-progress">
        <div class="quiz-meter"><span id="quiz-meter-fill"></span></div>
        <p id="quiz-count">Question 1 of 15</p>
      </div>
      <div class="quiz-card" id="quiz-card"></div>
      <div class="quiz-actions">
        <button class="secondary-button" id="quiz-prev" type="button">Previous</button>
        <button class="primary-button" id="quiz-next" type="button">Next</button>
      </div>
    </section>
  </main>

  <template id="result-template">
    <div class="result-modal" role="dialog" aria-modal="true" aria-labelledby="result-title">
      <div class="result-card">
        <p class="station-kicker">Quiz Saved</p>
        <h2 id="result-title">Great work</h2>
        <p class="result-score" id="result-score"></p>
        <div class="result-actions">
          <a class="primary-button" id="result-page-link" href="results.html">Open result page</a>
          <button class="secondary-button" id="copy-result-link" type="button">Copy share link</button>
          <button class="ghost-button" id="result-close" type="button">Keep practicing</button>
        </div>
        <p class="tiny-note">The result is saved on this browser. The share link lets it open on another device.</p>
      </div>
    </div>
  </template>

  <script src="app.js"></script>
</body>
</html>
