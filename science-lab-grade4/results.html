<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#174a63">
  <title>Science Lab Quiz Result</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="results-page">
  <header class="topbar">
    <a class="hub-link" href="./">Lab</a>
    <div class="brand">
      <div class="brand-mark" aria-hidden="true">R</div>
      <div>
        <p>Parent View</p>
        <h1>Last Quiz Result</h1>
      </div>
    </div>
    <div class="top-actions">
      <a class="ghost-button" href="../">Hub</a>
    </div>
  </header>

  <main class="result-shell">
    <section class="result-summary" id="result-summary"></section>
    <section class="review-list" id="review-list"></section>
  </main>

  <script>
    const RESULT_KEY = "scienceLabGrade4LastResult";

    function decodeResult(value) {
      try {
        return JSON.parse(decodeURIComponent(escape(atob(value))));
      } catch (error) {
        return null;
      }
    }

    function getResult() {
      const params = new URLSearchParams(location.search);
      const shared = params.get("r");
      if (shared) {
        const decoded = decodeResult(shared);
        if (decoded) return decoded;
      }
      try {
        return JSON.parse(localStorage.getItem(RESULT_KEY));
      } catch (error) {
        return null;
      }
    }

    function formatDate(value) {
      if (!value) return "Unknown time";
      return new Intl.DateTimeFormat(undefined, {
        dateStyle: "medium",
        timeStyle: "short"
      }).format(new Date(value));
    }

    function render() {
      const summary = document.getElementById("result-summary");
      const review = document.getElementById("review-list");
      const result = getResult();

      if (!result) {
        summary.innerHTML = `
          <p class="station-kicker">No saved result</p>
          <h2>Finish the quiz first</h2>
          <p class="muted">Open the lab, complete the final quiz, then this page will show the last score from this browser. A copied result link can also open here.</p>
          <a class="primary-button" href="./">Open Science Lab</a>
        `;
        review.innerHTML = "";
        return;
      }

      const percent = Math.round((result.score / result.total) * 100);
      summary.innerHTML = `
        <p class="station-kicker">Saved ${formatDate(result.finishedAt)}</p>
        <h2>${result.student || "Student"} scored ${result.score}/${result.total}</h2>
        <div class="big-score">${percent}%</div>
        <p class="muted">${result.score >= Math.ceil(result.total * 0.8) ? "Strong revision result." : "Review the missed questions below, then try again."}</p>
        <a class="primary-button" href="./">Practice again</a>
      `;

      review.innerHTML = result.answers.map((item, index) => `
        <article class="review-item ${item.correct ? "is-correct" : "is-wrong"}">
          <div class="review-number">${index + 1}</div>
          <div>
            <h3>${item.question}</h3>
            <p>Your answer: <strong>${item.selected || "Not answered"}</strong></p>
            <p>Correct answer: <strong>${item.correctAnswer}</strong></p>
          </div>
        </article>
      `).join("");
    }

    render();
  </script>
</body>
</html>
