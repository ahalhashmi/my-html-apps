function buildControls(){
  const fabricOptions = Object.entries(fabrics).map(([k,v])=>[k,v.name]);
  const groups = [
    ['Simulation',true,[buttonRow([['playPause','Pause','primary'],['resetCloth','Reset cloth',''],['calmWind','Calm wind','']]), selectField('quality','Quality preset',[['mobile','Mobile fast'],['balanced','Balanced'],['high','High realism'],['cinematic','Cinematic heavy']]), rangeField('timeScale'), rangeField('cols'), rangeField('iterations'), rangeField('substeps'), checkField('wire','Show particle wire')]],
    ['Flag size',true,[rangeField('flagW'),rangeField('flagH'),rangeField('texW')]],
    ['Fabric',true,[selectField('fabric','Fabric type',fabricOptions),rangeField('thicknessMm'),rangeField('fabricGsm'),rangeField('airDrag'),rangeField('stretch'),rangeField('bend'),rangeField('shear'),rangeField('damping'),rangeField('hem'),rangeField('roughness'),rangeField('wetness'),rangeField('seam')]],

  ];
  $('#controls').innerHTML = '<div class="note">Draw a custom flag or load a country preset in the designer. The canvas texture updates live on the 3D cloth.</div>' + groups.map(([t,o,items])=>`<details class="group" ${o?'open':''}><summary>${t}</summary><div class="body">${items.join('')}</div></details>`).join('');
  bindControlEvents();

function rangeField(id){const [label,min,max,step,unit]=numberDefs[id];return `<div class="field"><label>${label}<span class="val" data-for="${id}">${cfg[id]}${unit}</span></label><input data-cfg="${id}" id="${id}" type="range" min="${min}" max="${max}" step="${step}" value="${cfg[id]}"></div>`}
function checkField(id,label){return `<div class="field inline"><span class="flabel">${label}</span><input data-cfg="${id}" id="${id}" type="checkbox" ${cfg[id]?'checked':''}></div>`}
function selectField(id,label,opts){return `<div class="field"><label>${label}</label><select data-cfg="${id}" id="${id}">${opts.map(([v,t])=>`<option value="${v}" ${String(cfg[id])===String(v)?'selected':''}>${t}</option>`).join('')}</select></div>`}
function buttonRow(btns){return `<div class="buttons">${btns.map(([id,t,cl])=>`<button id="${id}" class="${cl||''}">${t}</button>`).join('')}</div>`}
function updateControls(){
  for(const [id,def] of Object.entries(numberDefs)){const el=$('#'+id), pill=$(`[data-for="${id}"]`); if(el) el.value=cfg[id]; if(pill){const unit=def[4]||''; const v=Number(cfg[id]); pill.textContent=(Math.abs(v)<10&&def[2]-def[1]<=5?v.toFixed(2).replace(/0+$/,'').replace(/\.$/,''):v)+unit;}}
  ['fabric','quality','tie','shadowMap'].forEach(id=>{const el=$('#'+id); if(el) el.value=cfg[id];});
  ['wire','poleCollision','selfShadow','groundShadow','autoRotate'].forEach(id=>{const el=$('#'+id); if(el) el.checked=!!cfg[id];});
}
function bindControlEvents(){
  $('#playPause').onclick=()=>{cfg.playing=!cfg.playing; $('#playPause').textContent=cfg.playing?'Pause':'Play'};
  $('#resetCloth').onclick=()=>rebuildCloth();
  $('#calmWind').onclick=()=>{cfg.windSpeed=1;cfg.gustStrength=0;cfg.turbulence=.05;cfg.randomness=0;updateControls();};
  $('#resetCamera').onclick=()=>resetCamera();
  $$('[data-cfg]').forEach(el=>el.oninput=()=>{
    const id=el.dataset.cfg; cfg[id]=el.type==='checkbox'?el.checked:(el.tagName==='SELECT'?el.value:Number(el.value));
    if(['thicknessMm','fabricGsm','airDrag','stretch','bend','shear','damping','hem','roughness','wetness','seam'].includes(id) && id!=='fabric') cfg.fabric='custom';
    if(id==='fabric') applyFabric(cfg.fabric);
    if(id==='quality') applyQuality(cfg.quality);
    if(['cols','flagW','flagH','tie','poleDiameter','polePadding'].includes(id)) rebuildCloth();
    if(['flagW','flagH','texW'].includes(id)) resizeDesignCanvas(true);
    if(['roughness','thicknessMm','selfShadow','groundShadow','sunElevation','sunAzimuth','sunIntensity','ambient','exposure','cameraFov','shadowMap','wire'].includes(id)) updateRendering();
    updateControls();
  });
  updateControls();
}
function applyFabric(key){const f=fabrics[key]; if(!f || key==='custom') return; Object.assign(cfg,f); cfg.fabric=key; rebuildCloth(); updateRendering(); updateControls();}
function applyQuality(q){
  const presets={mobile:{cols:34,iterations:3,substeps:1,shadowMap:1024},balanced:{cols:54,iterations:5,substeps:2,shadowMap:2048},high:{cols:78,iterations:7,substeps:3,shadowMap:2048},cinematic:{cols:100,iterations:10,substeps:4,shadowMap:4096}};

function doRedo(){if(!redo.length)return; const img=redo.pop(); undo.push(img); restore(img);}
function markTexture(){if(texture) texture.needsUpdate=true; updateCanvasInfo();}
function pointerDown(e){e.preventDefault(); start=last=canvasPoint(e); if(cfg.designTool==='fill'){pushUndo();bucketFill(start.x,start.y,$('#colorA').value,cfg.fillTolerance);pushUndo();markTexture();return} if(cfg.designTool==='text'){pushUndo();dctx.fillStyle=$('#colorA').value;dctx.font=`bold ${cfg.brush*3}px system-ui,sans-serif`;dctx.textAlign='center';dctx.textBaseline='middle';dctx.fillText($('#stampText').value,start.x,start.y);pushUndo();markTexture();return} drawing=true; snapshot=dctx.getImageData(0,0,designCanvas.width,designCanvas.height); pushUndo(); if(['brush','eraser'].includes(cfg.designTool)) drawStroke(start,start);}
function pointerMove(e){if(!drawing)return; const p=canvasPoint(e); if(cfg.designTool==='brush'||cfg.designTool==='eraser'){drawStroke(last,p); last=p;} else {dctx.putImageData(snapshot,0,0);drawShape(start,p,false);} markTexture();}
function pointerUp(){if(!drawing)return; drawing=false; pushUndo(); markTexture();}
function drawStroke(a,b){dctx.save();dctx.lineCap='round';dctx.lineJoin='round';dctx.lineWidth=cfg.brush; if(cfg.designTool==='eraser'){dctx.globalCompositeOperation='destination-out';} else {dctx.strokeStyle=$('#colorA').value;} dctx.beginPath();dctx.moveTo(a.x,a.y);dctx.lineTo(b.x,b.y);dctx.stroke();dctx.restore();}
function drawShape(a,b){dctx.save();dctx.lineWidth=cfg.brush;dctx.strokeStyle=$('#colorA').value;dctx.fillStyle=$('#colorB').value; const x=Math.min(a.x,b.x),y=Math.min(a.y,b.y),w=Math.abs(a.x-b.x),h=Math.abs(a.y-b.y); if(cfg.designTool==='line'){dctx.beginPath();dctx.moveTo(a.x,a.y);dctx.lineTo(b.x,b.y);dctx.stroke();} if(cfg.designTool==='rect'){dctx.fillRect(x,y,w,h);dctx.strokeRect(x,y,w,h);} if(cfg.designTool==='ellipse'){dctx.beginPath();dctx.ellipse((a.x+b.x)/2,(a.y+b.y)/2,w/2,h/2,0,0,Math.PI*2);dctx.fill();dctx.stroke();} dctx.restore();}
function hexToRgb(hex){const n=parseInt(hex.slice(1),16); return [n>>16&255,n>>8&255,n&255,255];}
function bucketFill(x,y,hex,tol){x=Math.floor(x);y=Math.floor(y);const img=dctx.getImageData(0,0,designCanvas.width,designCanvas.height),data=img.data,w=img.width,h=img.height,fill=hexToRgb(hex),i0=(y*w+x)*4,target=data.slice(i0,i0+4); const same=(i)=>Math.abs(data[i]-target[0])+Math.abs(data[i+1]-target[1])+Math.abs(data[i+2]-target[2])+Math.abs(data[i+3]-target[3])<=tol; const q=[[x,y]],seen=new Uint8Array(w*h); while(q.length){const [cx,cy]=q.pop(); if(cx<0||cy<0||cx>=w||cy>=h)continue; const p=cy*w+cx,i=p*4;if(seen[p]||!same(i))continue;seen[p]=1;data[i]=fill[0];data[i+1]=fill[1];data[i+2]=fill[2];data[i+3]=255;q.push([cx+1,cy],[cx-1,cy],[cx,cy+1],[cx,cy-1]);} dctx.putImageData(img,0,0);}
function drawStarterFlag(){dctx.fillStyle='#ffffff';dctx.fillRect(0,0,designCanvas.width,designCanvas.height);dctx.fillStyle='#de2536';dctx.fillRect(0,0,designCanvas.width,designCanvas.height/3);dctx.fillStyle='#2457c5';dctx.fillRect(0,designCanvas.height*2/3,designCanvas.width,designCanvas.height/3);markTexture();}
function drawPattern(kind){pushUndo();const w=designCanvas.width,h=designCanvas.height,a=$('#colorA').value,b=$('#colorB').value;dctx.fillStyle='white';dctx.fillRect(0,0,w,h); if(kind==='horizontal'){dctx.fillStyle=a;dctx.fillRect(0,0,w,h/3);dctx.fillStyle=b;dctx.fillRect(0,h*2/3,w,h/3);} if(kind==='vertical'){dctx.fillStyle=a;dctx.fillRect(0,0,w/3,h);dctx.fillStyle=b;dctx.fillRect(w*2/3,0,w/3,h);} if(kind==='cross'){dctx.fillStyle=b;dctx.fillRect(0,0,w,h);dctx.fillStyle='white';dctx.fillRect(w*.28,0,w*.16,h);dctx.fillRect(0,h*.42,w,h*.16);dctx.fillStyle=a;dctx.fillRect(w*.32,0,w*.08,h);dctx.fillRect(0,h*.46,w,h*.08);} if(kind==='canton'){for(let i=0;i<7;i++){dctx.fillStyle=i%2?a:'white';dctx.fillRect(0,i*h/7,w,h/7);}dctx.fillStyle=b;dctx.fillRect(0,0,w*.42,h*.54);} if(kind==='circle'){dctx.fillStyle='white';dctx.fillRect(0,0,w,h);dctx.fillStyle=a;dctx.beginPath();dctx.arc(w/2,h/2,Math.min(w,h)*.23,0,Math.PI*2);dctx.fill();} if(kind==='diagonal'){dctx.fillStyle=b;dctx.fillRect(0,0,w,h);dctx.fillStyle='white';dctx.beginPath();dctx.moveTo(0,h*.12);dctx.lineTo(w,0);dctx.lineTo(w,h*.18);dctx.lineTo(0,h*.84);dctx.closePath();dctx.fill();dctx.fillStyle=a;dctx.beginPath();dctx.moveTo(0,h*.25);dctx.lineTo(w,h*.02);dctx.lineTo(w,h*.17);dctx.lineTo(0,h*.98);dctx.closePath();dctx.fill();} pushUndo();markTexture();}
function drawImageCover(img){const w=designCanvas.width,h=designCanvas.height;dctx.fillStyle='white';dctx.fillRect(0,0,w,h); const r=Math.min(w/img.width,h/img.height),dw=img.width*r,dh=img.height*r; dctx.drawImage(img,(w-dw)/2,(h-dh)/2,dw,dh);}
function loadCountry(code){const img=new Image(); img.crossOrigin='anonymous'; img.onload=()=>{pushUndo();drawImageCover(img);pushUndo();markTexture();}; img.onerror=()=>alert('Could not load this flag. Check internet access or try another preset.'); img.src=`https://flagcdn.com/w1280/${code.toLowerCase()}.png`;}

function switchPage(id){$$('.page').forEach(p=>p.classList.toggle('active',p.id===id)); $$('.tab').forEach(t=>t.classList.toggle('active',t.dataset.page===id)); setTimeout(()=>{resizeRenderer();updateCanvasInfo();},50);}
$$('.tab').forEach(b=>b.onclick=()=>switchPage(b.dataset.page));

buildControls(); buildDesigner(); initThree();
</script>
