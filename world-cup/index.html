<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#073c3a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="World Cup">
  <title>World Cup UAE Schedule</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app-shell">
    <section class="hero">
      <img src="assets/schedule-banner.png" alt="" aria-hidden="true">
      <div class="hero-content">
        <a class="hub-link" href="../">App Hub</a>
        <p>2026 Match Schedule</p>
        <h1>World Cup</h1>
        <div class="hero-meta">
          <span id="match-count">Loading matches</span>
          <span>UAE time</span>
        </div>
      </div>
    </section>

    <section class="controls" aria-label="Schedule controls">
      <label class="search-box">
        <span>Search</span>
        <input id="search" type="search" placeholder="Team, city, round, group" autocomplete="off">
      </label>

      <div class="chip-row" aria-label="Filters">
        <button class="chip is-active" type="button" data-filter="all">All</button>
        <button class="chip" type="button" data-filter="today">Today</button>
        <button class="chip" type="button" data-filter="upcoming">Upcoming</button>
        <button class="chip" type="button" data-filter="groups">Groups</button>
        <button class="chip" type="button" data-filter="knockout">Knockout</button>
      </div>
    </section>

    <section class="status-panel" id="status-panel">
      <div>
        <p class="eyebrow">Source</p>
        <p id="source-line">Fetching public schedule API</p>
      </div>
      <button class="refresh-button" id="refresh-button" type="button">Refresh</button>
    </section>

    <section class="day-list" id="day-list" aria-live="polite"></section>
  </main>

  <script src="app.js"></script>
</body>
</html>
