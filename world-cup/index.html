<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#071312">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="World Cup">
  <title>World Cup 2026</title>
  <link rel="manifest" href="manifest.webmanifest">
  <script>
    if (localStorage.getItem("worldCupTheme") === "light") {
      document.documentElement.dataset.theme = "light";
    }
  </script>
  <link rel="stylesheet" href="styles.css?v=live-tabs-7">
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div>
        <h1>World Cup 2026</h1>
        <img class="visitor-badge" src="https://hits.sh/ahalhashmi.github.io/my-html-apps/world-cup.svg?label=visitors&color=0f766e&labelColor=232f2d" alt="Visitors">
      </div>
      <div class="top-actions">
        <button class="small-button" id="theme-toggle" type="button">Day</button>
        <button class="small-button" id="refresh" type="button">Refresh</button>
      </div>
    </header>

    <nav class="tabs" aria-label="World Cup views">
      <button class="tab is-active" type="button" data-tab="matches">Matches</button>
      <button class="tab" type="button" data-tab="groups">Groups</button>
    </nav>

    <section class="status" id="status">Loading live data...</section>
    <section class="content" id="content" aria-live="polite"></section>
  </main>

  <script src="app.js?v=live-tabs-7"></script>
</body>
</html>
