<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f2d2b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="World Cup">
  <title>World Cup Live UAE</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="styles.css?v=live-tabs-1">
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <a href="../" class="small-button">Hub</a>
      <div>
        <p>Live scores in UAE time</p>
        <h1>World Cup</h1>
      </div>
      <button class="small-button" id="refresh" type="button">Refresh</button>
    </header>

    <nav class="tabs" aria-label="World Cup views">
      <button class="tab is-active" type="button" data-tab="matches">Matches</button>
      <button class="tab" type="button" data-tab="groups">Groups</button>
      <button class="tab" type="button" data-tab="knockout">Knockout</button>
    </nav>

    <section class="status" id="status">Loading live data...</section>
    <section class="content" id="content" aria-live="polite"></section>
  </main>

  <script src="app.js?v=live-tabs-1"></script>
</body>
</html>
