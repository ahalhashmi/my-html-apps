<!doctype html>
<html lang="ar" dir="rtl" data-lang="ar">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#071312">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Sports Live">
  <title>كأس العالم 2026</title>
  <link rel="manifest" href="manifest.webmanifest">
  <script>
    if (localStorage.getItem("worldCupTheme") === "light") {
      document.documentElement.dataset.theme = "light";
    }
    const savedLang = localStorage.getItem("worldCupLangV2") || "ar";
    if (savedLang === "ar") {
      document.documentElement.lang = "ar";
      document.documentElement.dir = "rtl";
      document.documentElement.dataset.lang = "ar";
    } else {
      document.documentElement.lang = "en";
      document.documentElement.dir = "ltr";
      delete document.documentElement.dataset.lang;
    }
  </script>
  <link rel="stylesheet" href="styles.css?v=ufc-1">
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div>
        <h1>كأس العالم 2026</h1>
        <div class="visitor-meta">
          <span id="visitor-label">الزوار:</span>
          <img class="visitor-badge" src="https://hits.sh/ahalhashmi.github.io/my-html-apps/world-cup.svg?label=%20&color=0f766e&labelColor=232f2d" alt="الزوار">
          <span class="updated-at" id="updated-at"></span>
        </div>
        <div class="author-credit" id="author-credit">عبدالله الهاشمي</div>
      </div>
      <div class="header-controls">
        <div class="competition-controls">
          <select class="small-button competition-select" id="competition-select" aria-label="اختر نوع البطولة">
            <option value="cup">الكأس</option>
            <option value="league">الدوري</option>
            <option value="ufc">UFC</option>
          </select>
          <select class="small-button cup-select" id="cup-select" aria-label="اختر الكأس">
            <option value="worldcup">كأس العالم</option>
          </select>
          <select class="small-button league-select" id="league-select" aria-label="اختر الدوري" hidden>
            <option value="eng.1">الدوري الإنجليزي</option>
            <option value="esp.1">الدوري الإسباني</option>
            <option value="uae.pro">دوري الإمارات</option>
            <option value="ksa.1">الدوري السعودي</option>
            <option value="uefa.champions">دوري أبطال أوروبا</option>
          </select>
          <select class="small-button ufc-select" id="ufc-select" aria-label="اختر نوع فعاليات UFC" hidden>
            <option value="all">كل فعاليات UFC</option>
            <option value="numbered">فعاليات UFC المرقمة</option>
            <option value="fight-night">UFC فايت نايت</option>
          </select>
        </div>
        <div class="top-actions">
          <button class="small-button" id="lang-toggle" type="button">English</button>
          <select class="small-button edition-select" id="edition-select" aria-label="اختر نسخة كأس العالم">
            <option value="2026">2026</option>
          </select>
          <button class="small-button" id="timezone-toggle" type="button">التوقيت</button>
          <button class="small-button" id="theme-toggle" type="button">نهاري</button>
        </div>
      </div>
    </header>

    <nav class="tabs" aria-label="World Cup views">
      <button class="tab is-active" type="button" data-tab="matches">Matches</button>
      <button class="tab" type="button" data-tab="groups">Groups</button>
      <button class="tab" type="button" data-tab="knockout">Knockout</button>
      <button class="tab" type="button" data-tab="scorers">Scorers</button>
    </nav>

    <section class="content" id="content" aria-live="polite"></section>
    <footer class="source-credit" id="source-credit" hidden></footer>
  </main>

  <div class="timezone-panel" id="timezone-panel" hidden>
    <div class="timezone-dialog" role="dialog" aria-modal="true" aria-labelledby="timezone-title">
      <div class="timezone-head">
        <h2 id="timezone-title">التوقيت</h2>
        <button class="icon-button" id="timezone-close" type="button" aria-label="إغلاق">×</button>
      </div>
      <select class="timezone-select" id="timezone-select"></select>
      <button class="timezone-apply" id="timezone-apply" type="button">تم</button>
    </div>
  </div>

  <script src="app.js?v=ufc-1"></script>
</body>
</html>
