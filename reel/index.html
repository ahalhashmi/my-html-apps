<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Reel Sound Lab</title>
<style>
  :root{
    --bg:#07141c;
    --panel:#0d222c;
    --line:#244554;
    --text:#eef8fb;
    --muted:#9bb4be;
    --accent:#32d7c8;
  }

  *{box-sizing:border-box}

  body{
    margin:0;
    min-height:100vh;
    padding:16px;
    background:
      radial-gradient(circle at top left,rgba(50,215,200,.14),transparent 30%),
      var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  }

  .app{
    max-width:760px;
    margin:0 auto;
  }

  h1{
    margin:0 0 6px;
    font-size:30px;
  }

  .subtitle{
    color:var(--muted);
    font-size:13px;
    line-height:1.5;
    margin-bottom:16px;
  }

  .panel{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:18px;
    overflow:hidden;
  }

  .topbar{
    padding:14px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    border-bottom:1px solid var(--line);
  }

  button{
    border:1px solid var(--line);
    background:#14313e;
    color:var(--text);
    border-radius:11px;
    padding:11px 14px;
    font-weight:800;
    cursor:pointer;
  }

  button.primary{
    background:var(--accent);
    color:#032e2a;
    border-color:#65eadf;
  }

  button.danger{
    background:#4b252b;
    color:#ffd8d8;
    border-color:#74404a;
  }

  button.active{
    filter:brightness(1.2);
    transform:scale(.98);
  }

  .section{
    padding:14px;
    border-bottom:1px solid var(--line);
  }

  .section:last-child{
    border-bottom:0;
  }

  .section h2{
    margin:0 0 12px;
    font-size:13px;
    color:var(--accent);
    text-transform:uppercase;
    letter-spacing:.1em;
  }

  .grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
  }

  .control{
    display:block;
    padding:10px;
    border:1px solid var(--line);
    border-radius:12px;
    background:rgba(0,0,0,.12);
  }

  .head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    margin-bottom:7px;
  }

  .head span:first-child{
    font-size:12px;
    font-weight:750;
  }

  .value{
    color:var(--accent);
    font-size:11px;
    font-variant-numeric:tabular-nums;
  }

  input[type=range]{
    width:100%;
    accent-color:var(--accent);
  }

  select{
    width:100%;
    padding:9px;
    border-radius:9px;
    border:1px solid var(--line);
    background:#081921;
    color:var(--text);
  }

  textarea{
    width:100%;
    min-height:240px;
    resize:vertical;
    border:1px solid var(--line);
    border-radius:12px;
    background:#06141b;
    color:#c9e4eb;
    padding:12px;
    font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
    font-size:11px;
    line-height:1.45;
  }

  .status{
    padding:10px 14px;
    color:var(--muted);
    font-size:12px;
    border-top:1px solid var(--line);
  }

  .hold{
    width:100%;
    padding:20px;
    margin-top:10px;
    font-size:17px;
    touch-action:none;
    user-select:none;
    -webkit-user-select:none;
  }

  @media(max-width:620px){
    .grid{grid-template-columns:1fr}
  }
</style>
</head>
<body>
<div class="app">
  <h1>Reel Sound Lab</h1>
  <div class="subtitle">
    Tune only the fishing reel sound. Use Reel In for handle and gear noise, or Line Out for a fish taking drag.
  </div>

  <div class="panel">
    <div class="topbar">
      <button class="primary" id="enableAudio">Enable Audio</button>
      <button id="reelIn">Toggle Reel In</button>
      <button id="lineOut">Toggle Line Out</button>
      <button id="stopAll">Stop</button>
      <button class="danger" id="resetDefaults">Reset to Default</button>
    </div>

    <div class="section">
      <h2>Sound mode</h2>
      <div class="grid">
        <label class="control">
          <div class="head"><span>Waveform tone</span></div>
          <select id="waveform" data-param="waveform">
            <option value="sine">Smooth</option>
            <option value="triangle" selected>Mechanical</option>
            <option value="sawtooth">Rough / metallic</option>
            <option value="square">Sharp / digital</option>
          </select>
        </label>

        <label class="control">
          <div class="head"><span>Reel mode</span></div>
          <select id="mode" data-param="mode">
            <option value="reel">Reeling In</option>
            <option value="drag">Fish Taking Line</option>
          </select>
        </label>
      </div>
    </div>

    <div class="section">
      <h2>Main tone</h2>
      <div class="grid">
        <label class="control">
          <div class="head"><span>Base pitch</span><span class="value" data-value="basePitch"></span></div>
          <input type="range" min="40" max="3000" step="1" value="380" data-param="basePitch">
        </label>

        <label class="control">
          <div class="head"><span>Pitch movement</span><span class="value" data-value="pitchMovement"></span></div>
          <input type="range" min="0" max="1200" step="1" value="240" data-param="pitchMovement">
        </label>

        <label class="control">
          <div class="head"><span>Movement shape</span></div>
          <select id="movementShape" data-param="movementShape">
            <option value="sine" selected>Smooth wave</option>
            <option value="triangle">Triangle</option>
            <option value="saw">Rising ramp</option>
            <option value="reverseSaw">Falling ramp</option>
          </select>
        </label>

        <label class="control">
          <div class="head"><span>Sound speed</span><span class="value" data-value="speed"></span></div>
          <input type="range" min=".1" max="4" step=".01" value="1" data-param="speed">
        </label>

        <label class="control">
          <div class="head"><span>Tone volume</span><span class="value" data-value="toneVolume"></span></div>
          <input type="range" min="0" max="1" step=".01" value=".32" data-param="toneVolume">
        </label>
      </div>
    </div>

    <div class="section">
      <h2>Reel click tone and shape</h2>
      <div class="grid">
        <label class="control">
          <div class="head"><span>Click waveform</span></div>
          <select id="clickWaveform" data-param="clickWaveform">
            <option value="sine">Soft rounded</option>
            <option value="triangle">Mechanical</option>
            <option value="sawtooth">Metallic</option>
            <option value="square" selected>Hard click</option>
          </select>
        </label>

        <label class="control">
          <div class="head"><span>Click rate</span><span class="value" data-value="clickRate"></span></div>
          <input type="range" min="1" max="100" step="1" value="18" data-param="clickRate">
        </label>

        <label class="control">
          <div class="head"><span>Click start pitch</span><span class="value" data-value="clickPitch"></span></div>
          <input type="range" min="200" max="7000" step="10" value="1900" data-param="clickPitch">
        </label>

        <label class="control">
          <div class="head"><span>Pitch drop</span><span class="value" data-value="clickPitchDrop"></span></div>
          <input type="range" min="0" max=".95" step=".01" value=".50" data-param="clickPitchDrop">
        </label>

        <label class="control">
          <div class="head"><span>Attack</span><span class="value" data-value="clickAttack"></span></div>
          <input type="range" min=".0005" max=".03" step=".0005" value=".0015" data-param="clickAttack">
        </label>

        <label class="control">
          <div class="head"><span>Decay / click length</span><span class="value" data-value="clickDecay"></span></div>
          <input type="range" min=".003" max=".15" step=".001" value=".018" data-param="clickDecay">
        </label>

        <label class="control">
          <div class="head"><span>Click volume</span><span class="value" data-value="clickVolume"></span></div>
          <input type="range" min="0" max="1" step=".01" value=".55" data-param="clickVolume">
        </label>

        <label class="control">
          <div class="head"><span>Pitch randomness</span><span class="value" data-value="clickPitchRandom"></span></div>
          <input type="range" min="0" max=".5" step=".01" value=".05" data-param="clickPitchRandom">
        </label>

        <label class="control">
          <div class="head"><span>Volume randomness</span><span class="value" data-value="clickVolumeRandom"></span></div>
          <input type="range" min="0" max=".8" step=".01" value=".10" data-param="clickVolumeRandom">
        </label>

        <label class="control">
          <div class="head"><span>Click body tone</span><span class="value" data-value="clickBody"></span></div>
          <input type="range" min="0" max="1" step=".01" value=".28" data-param="clickBody">
        </label>

        <label class="control">
          <div class="head"><span>Body frequency</span><span class="value" data-value="clickBodyFrequency"></span></div>
          <input type="range" min="60" max="1800" step="5" value="420" data-param="clickBodyFrequency">
        </label>

        <label class="control">
          <div class="head"><span>High-pass sharpness</span><span class="value" data-value="clickHighPass"></span></div>
          <input type="range" min="20" max="3000" step="10" value="180" data-param="clickHighPass">
        </label>
      </div>

      <button id="testClick" style="margin-top:10px">Test Single Click</button>
    </div>

    <div class="section">
      <h2>Mechanical character</h2>
      <div class="grid">
        <label class="control">
          <div class="head"><span>Gear whine</span><span class="value" data-value="gearWhine"></span></div>
          <input type="range" min="0" max="1" step=".01" value=".24" data-param="gearWhine">
        </label>

        <label class="control">
          <div class="head"><span>Mechanical noise</span><span class="value" data-value="mechanicalNoise"></span></div>
          <input type="range" min="0" max="1" step=".01" value=".38" data-param="mechanicalNoise">
        </label>

        <label class="control">
          <div class="head"><span>Noise frequency</span><span class="value" data-value="noiseFrequency"></span></div>
          <input type="range" min="100" max="5000" step="10" value="1100" data-param="noiseFrequency">
        </label>

        <label class="control">
          <div class="head"><span>Resonance</span><span class="value" data-value="resonance"></span></div>
          <input type="range" min=".1" max="20" step=".1" value="2.2" data-param="resonance">
        </label>
      </div>
    </div>

    <div class="section">
      <h2>Fish taking line / drag</h2>
      <div class="grid">
        <label class="control">
          <div class="head"><span>Drag scream</span><span class="value" data-value="dragVolume"></span></div>
          <input type="range" min="0" max="1" step=".01" value=".65" data-param="dragVolume">
        </label>

        <label class="control">
          <div class="head"><span>Drag frequency</span><span class="value" data-value="dragFrequency"></span></div>
          <input type="range" min="200" max="6000" step="10" value="2400" data-param="dragFrequency">
        </label>

        <label class="control">
          <div class="head"><span>Drag roughness</span><span class="value" data-value="dragRoughness"></span></div>
          <input type="range" min=".1" max="12" step=".1" value="2.6" data-param="dragRoughness">
        </label>

        <label class="control">
          <div class="head"><span>Drag pulse</span><span class="value" data-value="dragPulse"></span></div>
          <input type="range" min="0" max="1" step=".01" value=".18" data-param="dragPulse">
        </label>
      </div>
    </div>

    <div class="section">
      <h2>Output</h2>
      <div class="grid">
        <label class="control">
          <div class="head"><span>Master volume</span><span class="value" data-value="masterVolume"></span></div>
          <input type="range" min="0" max="1" step=".01" value=".65" data-param="masterVolume">
        </label>
      </div>

      <button class="hold primary" id="holdButton">Hold to Play Selected Mode</button>
    </div>

    <div class="section">
      <h2>Selected parameters</h2>
      <textarea id="jsonOutput" spellcheck="false"></textarea>
      <div class="topbar" style="padding:10px 0 0;border:0">
        <button id="copyJson">Copy Parameters</button>
        <button id="refreshJson">Refresh</button>
      </div>
    </div>

    <div class="status" id="status">Audio is disabled.</div>
  </div>
</div>

<script>
(() => {
  "use strict";

  const $ = id => document.getElementById(id);
  const clamp = (v,a,b) => Math.max(a,Math.min(b,v));

  const defaults = {
    waveform: "triangle",
    movementShape: "sine",
    mode: "reel",

    basePitch: 380,
    pitchMovement: 240,
    speed: 1,
    toneVolume: .32,

    clickWaveform: "square",
    clickRate: 18,
    clickPitch: 1900,
    clickPitchDrop: .50,
    clickAttack: .0015,
    clickDecay: .018,
    clickVolume: .55,
    clickPitchRandom: .05,
    clickVolumeRandom: .10,
    clickBody: .28,
    clickBodyFrequency: 420,
    clickHighPass: 180,

    gearWhine: .24,
    mechanicalNoise: .38,
    noiseFrequency: 1100,
    resonance: 2.2,

    dragVolume: .65,
    dragFrequency: 2400,
    dragRoughness: 2.6,
    dragPulse: .18,

    masterVolume: .65
  };

  const params = {...defaults};

  let ctx = null;
  let master = null;

  let toneOsc = null;
  let toneGain = null;

  let whineOsc = null;
  let whineGain = null;

  let noiseSource = null;
  let noiseFilter = null;
  let noiseGain = null;

  let dragSource = null;
  let dragFilter = null;
  let dragGain = null;

  let activeMode = null;
  let animationId = null;
  let lastTime = 0;
  let clickAccumulator = 0;

  function makeNoiseBuffer(seconds = 3){
    const length = ctx.sampleRate * seconds;
    const buffer = ctx.createBuffer(1,length,ctx.sampleRate);
    const data = buffer.getChannelData(0);

    let brown = 0;
    for(let i=0;i<length;i++){
      const white = Math.random()*2-1;
      brown = (brown + .02*white)/1.02;
      data[i] = clamp(white*.8 + brown*2,-1,1);
    }

    return buffer;
  }

  async function enableAudio(){
    if(ctx){
      await ctx.resume();
      return;
    }

    const AudioContextClass = window.AudioContext || window.webkitAudioContext;

    if(!AudioContextClass){
      $("status").textContent = "Web Audio API is not supported in this browser.";
      return;
    }

    ctx = new AudioContextClass({latencyHint:"interactive"});

    master = ctx.createGain();
    master.gain.value = params.masterVolume;
    master.connect(ctx.destination);

    toneOsc = ctx.createOscillator();
    toneOsc.type = params.waveform;
    toneOsc.frequency.value = params.basePitch;

    toneGain = ctx.createGain();
    toneGain.gain.value = .0001;

    toneOsc.connect(toneGain).connect(master);
    toneOsc.start();

    whineOsc = ctx.createOscillator();
    whineOsc.type = "sine";
    whineOsc.frequency.value = params.basePitch*3;

    whineGain = ctx.createGain();
    whineGain.gain.value = .0001;

    whineOsc.connect(whineGain).connect(master);
    whineOsc.start();

    const noiseBuffer = makeNoiseBuffer();

    noiseSource = ctx.createBufferSource();
    noiseSource.buffer = noiseBuffer;
    noiseSource.loop = true;

    noiseFilter = ctx.createBiquadFilter();
    noiseFilter.type = "bandpass";
    noiseFilter.frequency.value = params.noiseFrequency;
    noiseFilter.Q.value = params.resonance;

    noiseGain = ctx.createGain();
    noiseGain.gain.value = .0001;

    noiseSource.connect(noiseFilter).connect(noiseGain).connect(master);
    noiseSource.start();

    dragSource = ctx.createBufferSource();
    dragSource.buffer = noiseBuffer;
    dragSource.loop = true;

    dragFilter = ctx.createBiquadFilter();
    dragFilter.type = "bandpass";
    dragFilter.frequency.value = params.dragFrequency;
    dragFilter.Q.value = params.dragRoughness;

    dragGain = ctx.createGain();
    dragGain.gain.value = .0001;

    dragSource.connect(dragFilter).connect(dragGain).connect(master);
    dragSource.start();

    $("enableAudio").textContent = "Audio Enabled";
    $("enableAudio").disabled = true;
    $("status").textContent = "Audio ready.";
  }

  function setGain(audioParam,value,time=.025){
    if(!ctx || !audioParam) return;
    audioParam.setTargetAtTime(Math.max(.0001,value),ctx.currentTime,time);
  }

  function playClick(){
    if(!ctx) return;

    const now = ctx.currentTime;

    const pitchVariation =
      1 + (Math.random()*2-1)*params.clickPitchRandom;

    const volumeVariation =
      1 + (Math.random()*2-1)*params.clickVolumeRandom;

    const startPitch = Math.max(50,params.clickPitch*pitchVariation);
    const endPitch = Math.max(
      40,
      startPitch*(1-params.clickPitchDrop)
    );

    const attack = Math.max(.0005,params.clickAttack);
    const decay = Math.max(attack+.001,params.clickDecay);

    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    const highPass = ctx.createBiquadFilter();

    osc.type = params.clickWaveform;
    osc.frequency.setValueAtTime(startPitch,now);
    osc.frequency.exponentialRampToValueAtTime(endPitch,now+decay);

    highPass.type = "highpass";
    highPass.frequency.value = params.clickHighPass;

    gain.gain.setValueAtTime(.0001,now);
    gain.gain.exponentialRampToValueAtTime(
      Math.max(.0002,.08*params.clickVolume*volumeVariation),
      now+attack
    );
    gain.gain.exponentialRampToValueAtTime(.0001,now+decay);

    osc.connect(highPass).connect(gain).connect(master);
    osc.start(now);
    osc.stop(now+decay+.02);

    if(params.clickBody>0){
      const bodyOsc = ctx.createOscillator();
      const bodyGain = ctx.createGain();
      const bodyFilter = ctx.createBiquadFilter();

      bodyOsc.type = "sine";
      bodyOsc.frequency.setValueAtTime(
        Math.max(40,params.clickBodyFrequency*pitchVariation),
        now
      );
      bodyOsc.frequency.exponentialRampToValueAtTime(
        Math.max(35,params.clickBodyFrequency*.55),
        now+decay*1.5
      );

      bodyFilter.type = "lowpass";
      bodyFilter.frequency.value = Math.max(100,params.clickBodyFrequency*2.3);

      bodyGain.gain.setValueAtTime(.0001,now);
      bodyGain.gain.exponentialRampToValueAtTime(
        .05*params.clickBody*params.clickVolume*volumeVariation,
        now+attack
      );
      bodyGain.gain.exponentialRampToValueAtTime(
        .0001,
        now+decay*1.5
      );

      bodyOsc.connect(bodyFilter).connect(bodyGain).connect(master);
      bodyOsc.start(now);
      bodyOsc.stop(now+decay*1.6+.02);
    }
  }

  function movementValue(timeSeconds){
    const phase = ((timeSeconds*params.speed)%1+1)%1;

    switch(params.movementShape){
      case "triangle":
        return 1 - 4*Math.abs(phase-.5);
      case "saw":
        return phase*2-1;
      case "reverseSaw":
        return 1-phase*2;
      default:
        return Math.sin(timeSeconds*params.speed*Math.PI*2);
    }
  }

  function startMode(mode){
    if(!ctx){
      enableAudio().then(() => startMode(mode));
      return;
    }

    activeMode = mode;
    params.mode = mode;
    $("mode").value = mode;

    $("reelIn").classList.toggle("active",mode==="reel");
    $("lineOut").classList.toggle("active",mode==="drag");

    clickAccumulator = 0;
    lastTime = performance.now();

    if(!animationId){
      animationId = requestAnimationFrame(updateSound);
    }

    $("status").textContent =
      mode==="reel"
      ? "Playing reel-in sound."
      : "Playing fish-taking-line drag sound.";

    refreshJson();
  }

  function stopSound(){
    activeMode = null;

    if(ctx){
      setGain(toneGain.gain,.0001);
      setGain(whineGain.gain,.0001);
      setGain(noiseGain.gain,.0001);
      setGain(dragGain.gain,.0001);
    }

    $("reelIn").classList.remove("active");
    $("lineOut").classList.remove("active");
    $("status").textContent = "Stopped.";
  }

  function updateSound(now){
    const dt = Math.min(.05,(now-lastTime)/1000 || 0);
    lastTime = now;

    if(ctx){
      master.gain.setTargetAtTime(params.masterVolume,ctx.currentTime,.04);

      toneOsc.type = params.waveform;

      const movement = movementValue(now/1000);
      const pulse = movement*params.pitchMovement;

      const toneFrequency = Math.max(20,params.basePitch + pulse);

      toneOsc.frequency.setTargetAtTime(
        toneFrequency,
        ctx.currentTime,
        .02
      );

      whineOsc.frequency.setTargetAtTime(
        Math.max(30,toneFrequency*3.1),
        ctx.currentTime,
        .02
      );

      noiseFilter.frequency.setTargetAtTime(
        params.noiseFrequency,
        ctx.currentTime,
        .03
      );

      noiseFilter.Q.setTargetAtTime(
        params.resonance,
        ctx.currentTime,
        .03
      );

      dragFilter.frequency.setTargetAtTime(
        params.dragFrequency + pulse*.8,
        ctx.currentTime,
        .02
      );

      dragFilter.Q.setTargetAtTime(
        params.dragRoughness,
        ctx.currentTime,
        .03
      );

      if(activeMode==="reel"){
        setGain(toneGain.gain,params.toneVolume*.05);
        setGain(whineGain.gain,params.gearWhine*.022);
        setGain(noiseGain.gain,params.mechanicalNoise*.045);
        setGain(dragGain.gain,.0001);

        clickAccumulator += dt*params.clickRate*params.speed;

        while(clickAccumulator>=1){
          clickAccumulator -= 1;
          playClick();
        }
      }
      else if(activeMode==="drag"){
        const dragPulse =
          1 +
          movement *
          params.dragPulse;

        setGain(toneGain.gain,params.toneVolume*.018);
        setGain(whineGain.gain,params.gearWhine*.012);
        setGain(noiseGain.gain,params.mechanicalNoise*.018);
        setGain(dragGain.gain,params.dragVolume*.09*dragPulse);

        clickAccumulator += dt*params.clickRate*params.speed*1.7;

        while(clickAccumulator>=1){
          clickAccumulator -= 1;
          playClick();
        }
      }
      else{
        setGain(toneGain.gain,.0001);
        setGain(whineGain.gain,.0001);
        setGain(noiseGain.gain,.0001);
        setGain(dragGain.gain,.0001);
      }
    }

    animationId = requestAnimationFrame(updateSound);
  }

  function updateLabels(){
    document.querySelectorAll("[data-value]").forEach(el => {
      const key = el.dataset.value;
      const value = params[key];

      if([
        "basePitch",
        "clickPitch",
        "clickBodyFrequency",
        "clickHighPass",
        "noiseFrequency",
        "dragFrequency"
      ].includes(key)){
        el.textContent = Math.round(value)+" Hz";
      }
      else if(key==="clickRate"){
        el.textContent = Math.round(value)+"/s";
      }
      else if(["clickAttack","clickDecay"].includes(key)){
        el.textContent = Number(value).toFixed(4)+" s";
      }
      else if(key==="speed"){
        el.textContent = Number(value).toFixed(2)+"×";
      }
      else{
        el.textContent = Number(value).toFixed(2);
      }
    });
  }

  function syncControls(){
    document.querySelectorAll("[data-param]").forEach(el => {
      const key = el.dataset.param;
      el.value = params[key];
    });

    updateLabels();
    refreshJson();
  }

  function resetDefaults(){
    stopSound();

    Object.keys(defaults).forEach(key => {
      params[key] = defaults[key];
    });

    syncControls();
    $("status").textContent = "All parameters reset to default.";
  }

  function refreshJson(){
    $("jsonOutput").value = JSON.stringify({
      schema:"ReelSoundParameters",
      version:2,
      parameters:{...params}
    },null,2);
  }

  document.querySelectorAll("[data-param]").forEach(el => {
    el.addEventListener("input",() => {
      const key = el.dataset.param;
      params[key] =
        el.tagName==="SELECT"
        ? el.value
        : Number(el.value);

      if(key==="mode" && activeMode){
        startMode(params.mode);
      }

      updateLabels();
      refreshJson();
    });
  });

  $("enableAudio").addEventListener("click",enableAudio);
  $("reelIn").addEventListener("click",() => {
    activeMode==="reel" ? stopSound() : startMode("reel");
  });
  $("lineOut").addEventListener("click",() => {
    activeMode==="drag" ? stopSound() : startMode("drag");
  });
  $("stopAll").addEventListener("click",stopSound);
  $("resetDefaults").addEventListener("click",resetDefaults);

  $("testClick").addEventListener("click",async() => {
    await enableAudio();
    playClick();
    $("status").textContent = "Single click played.";
  });

  const holdButton = $("holdButton");

  holdButton.addEventListener("pointerdown",async e => {
    e.preventDefault();

    if(!ctx){
      await enableAudio();
    }

    try{
      holdButton.setPointerCapture(e.pointerId);
    }catch(_){}

    holdButton.classList.add("active");
    startMode(params.mode);
  });

  ["pointerup","pointercancel","lostpointercapture","pointerleave"].forEach(name => {
    holdButton.addEventListener(name,e => {
      e.preventDefault();
      holdButton.classList.remove("active");
      stopSound();
    });
  });

  $("refreshJson").addEventListener("click",refreshJson);

  $("copyJson").addEventListener("click",async() => {
    refreshJson();

    try{
      await navigator.clipboard.writeText($("jsonOutput").value);
      $("status").textContent = "Parameters copied.";
    }
    catch(_){
      $("jsonOutput").select();
      document.execCommand("copy");
      $("status").textContent = "Parameters copied.";
    }
  });

  syncControls();
})();
</script>
</body>
</html>
